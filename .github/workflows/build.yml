name: Revive x64 Build (Win11/Quest3)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Vulkan SDK
        uses: lukka/get-vulkan-sdk@v1
        with:
          sdk_version: 1.3.268.0

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: 'win64_msvc2019_64'

      - name: Setup NSIS
        run: choco install nsis -y

      # Manually build Detours as it's a static dependency in your DllMain
      - name: Build Detours
        run: |
          git clone https://github.com/microsoft/Detours.git
          cd Detours
          nmake
          cd ..
          mkdir Externals\Detours\include
          mkdir Externals\Detours\lib.X64
          copy Detours\include\* Externals\Detours\include\
          copy Detours\lib.X64\* Externals\Detours\lib.X64\

      - name: Build Revive Core (DLLs)
        run: |
          msbuild Revive.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Dashboard (Qt6)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd ReviveOverlay
          qmake ReviveOverlay.pro
          nmake release

      - name: Bundle Deployment
        shell: pwsh
        run: |
          mkdir Release
          # Copy binaries from the build folders
          copy x64\Release\*.dll Release\
          copy x64\Release\ReviveInjector.exe Release\
          copy ReviveOverlay\release\ReviveOverlay.exe Release\
          # Deploy Qt dependencies (Essential for the QML files to work)
          windeployqt --release --qmldir ReviveOverlay Release\ReviveOverlay.exe

      - name: Build Final Installer
        run: |
          makensis /DNIGHTLY Revive.nsi
        working-directory: .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Revive-Quest3-Win11-x64
          path: |
            *.exe
            Release/
