name: Revive x64 Build (Win11/Quest3)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Configures MSVC compiler/nmake paths dynamically without hardcoded directories
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Installs LunarG Vulkan SDK with caching disabled to prevent deprecated cache toolkit errors
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1
        with:
          version: latest
          cache: false

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: 'win64_msvc2019_64'

      - name: Setup NSIS
        run: choco install nsis -y

      - name: Build Detours
        run: |
          git clone https://github.com/microsoft/Detours.git
          cd Detours
          nmake
          cd ..
          mkdir Externals\Detours\include
          mkdir Externals\Detours\lib.X64
          copy Detours\include\* Externals\Detours\include\
          copy Detours\lib.X64\* Externals\Detours\lib.X64\

      - name: Build Revive Core (DLLs)
        run: |
          msbuild Revive.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Build Dashboard (Qt6)
        run: |
          cd ReviveOverlay
          qmake ReviveOverlay.pro
          nmake release

      - name: Bundle Deployment
        shell: pwsh
        run: |
          mkdir Release -Force
          # Copy binaries from the build folders
          copy x64\Release\*.dll Release\
          copy x64\Release\ReviveInjector.exe Release\
          copy ReviveOverlay\release\ReviveOverlay.exe Release\
          
          # Deploy Qt dependencies (Essential for the QML files to work)
          windeployqt --release --qmldir ReviveOverlay Release\ReviveOverlay.exe
          
          # Mirror 'Release' folder structure to prevent NSIS relative path errors (..\Release)
          mkdir ../Release -Force
          Copy-Item -Path Release\* -Destination ../Release -Recurse -Force

      - name: Build Final Installer
        run: |
          makensis /DNIGHTLY Revive.nsi
        working-directory: .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Revive-Quest3-Win11-x64
          path: |
            *.exe
            Release/
